---
# Inventory for the OVH dedicated server that also runs the hardened baseline
# from Clispi/ovhcloud-server-setup. Ansible connects as the automation admin
# account (ansible-clispi) on the hardened SSH port 2222 — the same identity the
# server repo uses steady-state. This playbook only ADDS the weddingbot user and
# its systemd user timers; it does not touch SSH/firewall config.
#
# Per-server connection details (IP/DNS, private key path) live in a gitignored
# host_vars/dev.yml — copy host_vars/dev.yml.example and fill it in.

all:
  children:
    ovh:
      hosts:
        dev:        # real ansible_host / key path -> host_vars/dev.yml (gitignored)
      vars:
        ansible_user: ansible-clispi
        ansible_port: 2222
